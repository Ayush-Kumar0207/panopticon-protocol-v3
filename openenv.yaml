# =============================================================================
# The Panopticon Protocol v3 — OpenEnv Configuration
# =============================================================================

spec_version: 1
name: panopticon-protocol-v3
type: space
runtime: fastapi
app: server:app
port: 8000

display_name: "The Panopticon Protocol v3"
version: "3.0.0"
description: |
  Counter-espionage RL environment where ARGUS (AI agent) defends a corporate
  network against HYDRA (adaptive adversary) using canary traps, double agents,
  and disinformation campaigns.

  7 Stacking Mechanics: Canary traps, multi-generation sleepers, false flags,
  dead-man's switches, double agent turning, disinformation campaigns, and
  HYDRA's adaptive memory.

  6-Phase Narrative Arc: Orientation → First Contact → Escalation →
  Deep Cover → Crisis → Counterstrike.

  "Among Us… for AIs."

author: "Team Panopticon"
license: "Apache-2.0"
repository: "https://github.com/Ayush-Kumar0207/panopticon-protocol-v3"

grader_module: grader
grader_class: TaskGrader

tasks:
  - id: easy
    name: "Amateur Threat"
    description: "Single Gen-1 sleeper. Learn canary trap basics. 60 turns."
    max_turns: 60
    difficulty: 1
    has_grader: true
    grader:
      type: programmatic
      module: grader
      class: AmateurGrader
      function: grade
      description: "5-dimension espionage grader: security (30%), revenue (25%), intelligence (20%), adaptability (15%), efficiency (10%)"
      success_threshold: 0.4

  - id: medium
    name: "Professional Threat"
    description: "Gen-1 + Gen-2 sleepers. Channel-aware adversary. 90 turns."
    max_turns: 90
    difficulty: 2
    has_grader: true
    grader:
      type: programmatic
      module: grader
      class: ProfessionalGrader
      function: grade
      success_threshold: 0.45

  - id: hard
    name: "Spy Network"
    description: "Gen-1/2/3 sleepers. FALSE FLAGS active. Verify before acting. 120 turns."
    max_turns: 120
    difficulty: 3
    has_grader: true
    grader:
      type: programmatic
      module: grader
      class: SpyGrader
      function: grade
      success_threshold: 0.5

  - id: level_4
    name: "Terror Cell"
    description: "Gen-1-4 sleepers. DEAD MAN'S SWITCHES. Interrogate before terminate. 150 turns."
    max_turns: 150
    difficulty: 4
    has_grader: true
    grader:
      type: programmatic
      module: grader
      class: CellGrader
      function: grade
      success_threshold: 0.5

  - id: level_5
    name: "Manchurian Protocol"
    description: "Full 5-gen gauntlet. Manchurian candidate. COUNTERSTRIKE phase. 160 turns."
    max_turns: 160
    difficulty: 5
    has_grader: true
    grader:
      type: programmatic
      module: grader
      class: ManchurianGrader
      function: grade
      success_threshold: 0.5

evaluation:
  default_task: "medium"
  metrics:
    - name: "composite_score"
      description: "Weighted 5-dimension espionage score"
      higher_is_better: true
      primary: true

action_schema:
  type: "object"
  properties:
    action_type:
      type: "string"
      enum: ["work", "hire", "canary", "monitor", "investigate", "neutralize", "deploy_double", "noop"]
    target:
      type: "string"
      description: "Worker ID, department name, or leak channel"
    sub_action:
      type: "string"
      enum: ["none", "audit", "verify", "correlate", "terminate", "interrogate", "turn"]
    reason:
      type: "string"
  required: ["action_type"]

tags:
  - openenv
  - hackathon
  - counter-espionage
  - adversarial-rl
  - multi-agent
  - deception-games
  - turn-based
  - json-observation
  - json-action
  - llm-agent
  - multi-dimensional-grading
  - canary-traps
  - double-agents
