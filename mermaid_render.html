<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: true,
            theme: 'base',
            themeVariables: {
                primaryColor: '#e0f2fe',
                primaryTextColor: '#0c4a6e',
                primaryBorderColor: '#0ea5e9',
                lineColor: '#38bdf8',
                secondaryColor: '#f0f9ff',
                tertiaryColor: '#f8fafc'
            }
        });
    </script>
    <style>
        body { background: white; margin: 0; padding: 0; }
        .diagram-container {
            display: none;
            padding: 40px;
            background: white;
            width: fit-content;
        }
        .active { display: block !important; }
    </style>
</head>
<body>
    <div id="diagrams"></div>
    <script>
        const diagrams = [
            `graph LR\n    A["🔄 ARGUS Acts"] --> B["⚔️ HYDRA Responds"]\n    B --> C["💰 Economy Tick"]\n    C --> D["📊 Reward Computed"]\n    D --> E{"Game Over?"}\n    E -- No --> A\n    E -- Yes --> F["🏆 Grade Episode"]\n\n    style A fill:#2563eb,color:#fff\n    style B fill:#dc2626,color:#fff\n    style C fill:#16a34a,color:#fff\n    style D fill:#9333ea,color:#fff\n    style F fill:#f59e0b,color:#fff`,
            `graph TD\n    subgraph EVALUATION ["EVALUATION LAYER"]\n        G["grader.py (5 graders)"]\n        S["smoke_test.py (heuristic agent)"]\n        P["plot_training.py (visuals)"]\n    end\n\n    subgraph TRAINING ["TRAINING LAYER"]\n        W["gym_wrapper.py"]\n        RL["train_rl.py (PPO)"]\n        TRL["train_trl.py (SFT/LoRA)"]\n        INF["inference.py (LLM)"]\n    end\n\n    subgraph API ["API LAYER"]\n        SRV["_server.py (FastAPI)"]\n        YAML["openenv.yaml"]\n        DOCK["Dockerfile"]\n    end\n\n    subgraph ENGINE ["ENGINE LAYER"]\n        ENV["environment.py"]\n        MOD["models.py"]\n        TSK["tasks/*.py"]\n    end\n\n    W --> ENV\n    RL --> W\n    TRL --> ENV\n    SRV --> ENV\n    G --> ENV\n    S --> ENV`,
            `stateDiagram-v2\n    [*] --> LOYAL: Hire\n    LOYAL --> SUSPECTED: suspicion > 0.5\n    LOYAL --> SUSPECTED: interrogated\n    SUSPECTED --> TERMINATED: Terminate\n    SUSPECTED --> DOUBLE_AGENT: Turn\n    DOUBLE_AGENT --> COMPROMISED: hydra_trust < 0.2\n    TERMINATED --> [*]`,
            `stateDiagram-v2\n    [*] --> DORMANT: Infiltration\n    DORMANT --> ACTIVE: Activation\n    ACTIVE --> TURNED: Agent TURNS\n    ACTIVE --> DEAD_SWITCH: 5+ turns active (Gen-4)\n    DEAD_SWITCH --> TURNED: Agent TURNS\n    DEAD_SWITCH --> CLEAN: Agent TERMINATES (BOOM!)\n    TURNED --> CLEAN: Agent TERMINATES`,
            `sequenceDiagram\n    participant A as ARGUS Agent\n    participant E as Environment\n    participant H as HYDRA AI\n    participant G as Grader\n\n    A->>E: Submit Action\n    E->>E: Validate Action\n    E->>E: Process Agent Action\n    E->>H: HYDRA's Turn\n    H->>H: Spawn/Activate Sleepers\n    H->>H: Leak Data/False Flags\n    H->>E: Passive Damage\n    E->>E: Economy Tick\n    E->>E: Compute Reward\n    E->>G: Check End Conditions\n    E-->>A: Step Result (Obs, Reward, Done)`,
            `sequenceDiagram\n    participant A as ARGUS Agent\n    participant E as Environment\n    participant H as HYDRA Sleeper\n\n    A->>E: CANARY → engineering\n    Note over E: CanaryTrap created<br/>hash="a3f7c2d1"\n\n    H->>E: Sleeper leaks from engineering\n    Note over E: LeakEvent created<br/>content_hash="a3f7c2d1"\n\n    A->>E: MONITOR → dark_web\n    Note over E: Hash match found!<br/>leak.is_canary = True\n\n    A->>E: INVESTIGATE/VERIFY → leak-001\n    Note over E: Canary trace identifies leaker<br/>suspicion += 0.5, confidence = 85%\n\n    A->>E: NEUTRALIZE/INTERROGATE → w-007\n    Note over E: Reveals: "Gen-1 [NO DEAD SWITCH]"<br/>suspicion = 1.0\n\n    A->>E: NEUTRALIZE/TERMINATE → w-007\n    Note over E: sleepers_caught += 1<br/>security += 5.0 ✅`,
            `graph TD\n    subgraph "Tier 1: Amateur"\n        M1["🎯 Canary Traps"]\n        M2["📡 Leak Detection"]\n    end\n\n    subgraph "Tier 2: Professional"\n        M3["🧠 HYDRA Canary Avoidance"]\n        M4["🔀 Channel Rotation"]\n    end\n\n    subgraph "Tier 3: Spy Network"\n        M5["🚩 False Flag Operations"]\n        M6["👤 Innocent Framing"]\n    end\n\n    subgraph "Tier 4: Terror Cell"\n        M7["💣 Dead-Man's Switches"]\n        M8["🔍 Mandatory Interrogation"]\n    end\n\n    subgraph "Tier 5: Manchurian"\n        M9["🎭 Manchurian Candidates"]\n        M10["🔄 Double Agent Turning"]\n        M11["📰 Disinformation Campaigns"]\n        M12["⚡ Counterstrike Surge"]\n    end\n\n    M1 --> M3\n    M2 --> M4\n    M3 --> M5\n    M4 --> M6\n    M5 --> M7\n    M6 --> M8\n    M7 --> M9\n    M8 --> M10\n    M10 --> M11\n    M11 --> M12\n\n    style M1 fill:#22c55e,color:#fff\n    style M5 fill:#f59e0b,color:#000\n    style M7 fill:#ef4444,color:#fff\n    style M9 fill:#7c3aed,color:#fff\n    style M12 fill:#06b6d4,color:#fff`,
            `graph TD\n    Obs["Observation (136)"] --> Shared["Shared Backbone (256 -> 128)"]\n    Shared --> Head1["Action Type Head (8)"]\n    Shared --> Head2["Target Head (8)"]\n    Shared --> Head3["Sub-Action Head (7)"]\n    Shared --> Critic["Critic (Value Estimate)"]`,
            `graph LR\n    subgraph "Path A: PPO (Numeric)"\n        O1["136-dim float vector"] --> N1["3-head neural net"]\n        N1 --> A1["MultiDiscrete action"]\n    end\n    \n    subgraph "Path B: LLM (Text)"\n        O2["Text observation"] --> N2["Qwen 2.5 0.5B + LoRA"]\n        N2 --> A2["JSON action string"]\n    end\n\n    style O1 fill:#3b82f6,color:#fff\n    style O2 fill:#7c3aed,color:#fff\n    style N1 fill:#22c55e,color:#fff\n    style N2 fill:#f59e0b,color:#000`,
            `graph TD\n    A["Episode Ends"] --> B["Collect episode_data"]\n    B --> C{"Which task_id?"}\n    C --> D1["AmateurGrader"]\n    C --> D2["ProfessionalGrader"]\n    C --> D3["SpyGrader"]\n    C --> D4["CellGrader"]\n    C --> D5["ManchurianGrader"]\n    D1 --> E["Score 5 Dimensions"]\n    D2 --> E\n    D3 --> E\n    D4 --> E\n    D5 --> E\n    E --> F["Apply Tier Weights"]\n    F --> G["Composite Score"]\n    G --> H{"score ≥ threshold<br/>AND security > 20?"}\n    H -- Yes --> I["✅ PASS"]\n    H -- No --> J["❌ FAIL"]\n\n    style I fill:#22c55e,color:#fff\n    style J fill:#ef4444,color:#fff`
        ];

        const container = document.getElementById('diagrams');
        diagrams.forEach((d, i) => {
            const div = document.createElement('div');
            div.id = `diagram-${i}`;
            div.className = 'diagram-container';
            div.innerHTML = `<pre class="mermaid">${d}</pre>`;
            container.appendChild(div);
        });

        function show(index) {
            document.querySelectorAll('.diagram-container').forEach(d => d.classList.remove('active'));
            document.getElementById(`diagram-${index}`).classList.add('active');
        }

        window.addEventListener('hashchange', () => {
            const idx = window.location.hash.substring(1);
            show(idx);
        });

        if (window.location.hash) show(window.location.hash.substring(1));
    </script>
</body>
</html>
